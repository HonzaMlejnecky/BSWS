# ==============================================================================
# HOSTING CENTRUM - Spring Boot Configuration
# ==============================================================================

# --- Application ---
spring.application.name=hosting-centrum

# --- Database ---
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mariadb://db:3306/hosting_platform}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:platform_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:platformpass123}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# --- Root Database (for physical DB operations) ---
root.datasource.url=${ROOT_DATASOURCE_URL:jdbc:mariadb://db:3306/}
root.datasource.username=${ROOT_DATASOURCE_USERNAME:root}
root.datasource.password=${ROOT_DATASOURCE_PASSWORD:rootpass123}
root.datasource.driver-class-name=org.mariadb.jdbc.Driver


spring.datasource.iredmail.url=jdbc:mariadb://iredmail:3306/vmail
spring.datasource.iredmail.username=root
spring.datasource.iredmail.password=password

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect

# --- Flyway ---
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.validate-on-migrate=true

# --- Mail ---
spring.mail.host=mail.magehosting.cz
spring.mail.port=587
spring.mail.username=postmaster@magehosting.cz
spring.mail.password=password
spring.mail.protocol=smtp
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.debug=false
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=*
spring.mail.properties.mail.smtp.ssl.checkserveridentity=false

# --- Server ---
server.port=8080

# --- Actuator ---
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# --- Logging ---
logging.level.root=INFO
logging.level.cz.hostingcentrum=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.flywaydb=INFO

# --- Custom properties ---
app.customers-path=${CUSTOMERS_PATH:/srv/customers}
app.verification.base-url=${APP_VERIFICATION_BASE_URL:http://localhost:8080}
app.apache.vhosts-dir=${APP_APACHE_VHOSTS_DIR:/srv/apache/vhosts.d}
app.apache.vhost-filename-pattern=${APP_APACHE_VHOST_FILENAME_PATTERN:project-%s.conf}
app.apache.validate-command=${APP_APACHE_VALIDATE_COMMAND:true}
app.apache.reload-command=${APP_APACHE_RELOAD_COMMAND:true}
