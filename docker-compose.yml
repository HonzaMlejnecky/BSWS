    ##############################################################################
  # HOSTING CENTRUM BSWS - Docker Compose
  #
  # Orchestration of all hosting platform services.
  #
  # Architecture:
  #   Browser → Apache (:80) → Spring Boot (:8080) → MariaDB (:3306)
  #                   |
  #                   +→ Customer websites from /srv/customers/{user}/www
  #
  #   FTP (:21) → /srv/customers/{user}/
  #   Mailpit (:8025 web, :1025 SMTP)
  #
  # Start:          docker-compose up -d --build
  # Stop:           docker-compose down
  # Reset DB:       docker-compose down -v && docker-compose up -d --build
  # Logs:           docker-compose logs -f
  # Service logs:   docker-compose logs -f backend
  ##############################################################################

  services:

    # -----------------------
    # FRONTEND BUILD (jen pro build statického dist)
    # -----------------------
    frontend-build:
      build:
        context: ./frontend
        dockerfile: Dockerfile
      container_name: hc-frontend-build
      volumes:
        - ./frontend/dist:/out
      command: sh -c "cp -R /app/dist/* /out/"
      networks:
        - hosting-net

    # ==========================================================================
    # APACHE HTTP SERVER (Reverse Proxy + Static Sites)
    #
    # Responsibility: WEBSERVER TEAM
    # Configuration:  web/apache-config/
    # Documentation:  docs/UKOLY-WEBSERVER.md
    # ==========================================================================
    web:
      image: httpd:2.4-alpine
      container_name: hc-web
      restart: unless-stopped
      depends_on:
        backend:
          condition: service_healthy
        frontend-build:
          condition: service_completed_successfully
      volumes:
        # Apache configuration
        - ./web/apache-config/httpd.conf:/usr/local/apache2/conf/httpd.conf:ro
        - ./web/apache-config/vhosts.conf:/usr/local/apache2/conf/extra/vhosts.conf:ro
        # Customer websites - Apache serves static content
        - ./customers:/srv/customers:ro
        - ./frontend/dist:/srv/frontend:ro
      ports:
        - "${WEB_PORT:-80}:80"
      networks:
        - hosting-net
      healthcheck:
        test: ["CMD", "httpd", "-t"]
        interval: 30s
        timeout: 10s
        retries: 3


    # ==========================================================================
    # SPRING BOOT BACKEND (API + Business Logic)
    #
    # Responsibility: BACKEND TEAM
    # Sources:        backend/
    # Documentation:  docs/UKOLY-BACKEND.md
    # ==========================================================================
    backend:
      build: ./backend
      container_name: hc-backend
      restart: unless-stopped
      depends_on:
        db:
          condition: service_healthy
        iredmail:
          condition: service_started
      environment:
        # Spring profile
        SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}

        # Database - platform
        SPRING_DATASOURCE_URL: jdbc:mariadb://db:3306/${DB_NAME:-hosting_platform}
        SPRING_DATASOURCE_USERNAME: ${DB_USER:-platform_user}
        SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-platformpass123}

        # Database - root access for creating customer databases
        DB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpass123}

        SPRING_MAIL_HOST: mail.magehosting.cz
        SPRING_MAIL_PORT: 587
        SPRING_MAIL_USERNAME: postmaster@magehosting.cz
        SPRING_MAIL_PASSWORD: password
        SPRING_MAIL_PROTOCOL: smtp
        SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH: "true"
        SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE: "true"
        SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_REQUIRED: "true"
        SPRING_MAIL_PROPERTIES_MAIL_SMTP_SSL_TRUST: "*"

        # Paths
        CUSTOMERS_PATH: /srv/customers
      volumes:
        # Customer folders - backend creates them when hosting is activated
        - ./customers:/srv/customers
        - ./backend/src:/app/src
        - ./backend/pom.xml:/app/pom.xml
        - sftpgodata:/srv/sftpgo/data
      ports:
        - "${BACKEND_PORT:-8083}:8080"
      networks:
        - hosting-net
      healthcheck:
        test: [ "CMD", "curl", "-f", "http://localhost:8080/actuator/health" ]
        interval: 30s
        timeout: 10s
        retries: 5
        start_period: 30s

    # ==========================================================================
    # MARIADB (Database)
    #
    # Responsibility: DATABASE TEAM
    # Init scripts:   db/init/
    # Documentation:  docs/UKOLY-DATABAZE.md
    #
    # NOTE: Contains TWO levels of databases:
    #   1. hosting_platform - system DB (users, orders, ...)
    #   2. cust_* - customer DBs (WordPress, e-shops, ...)
    # ==========================================================================
    db:
      image: mariadb:11
      container_name: hc-db
      restart: unless-stopped
      environment:
        MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpass123}
        MYSQL_DATABASE: ${DB_NAME:-hosting_platform}
        MYSQL_USER: ${DB_USER:-platform_user}
        MYSQL_PASSWORD: ${DB_PASSWORD:-platformpass123}
      volumes:
        # Persistent data
        - db_data:/var/lib/mysql
        # NOTE: Init scripts are now managed by Flyway in backend
        # Kept for compatibility with old installations
        # - ./db/init:/docker-entrypoint-initdb.d:ro
      ports:
        - "${DB_PORT:-3307}:3306"   # External port configurable in .env
      networks:
        - hosting-net
      healthcheck:
        test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
        interval: 10s
        timeout: 5s
        retries: 10
        start_period: 30s

    # ==========================================================================
    # FTP SERVER (Pure-FTPd)
    #
    # Responsibility: FTP TEAM
    # Configuration:  ftp/
    # Documentation:  docs/UKOLY-FTP.md
    # ==========================================================================
    sftpgo:
      image: drakkan/sftpgo:latest
      container_name: hc-sftpgo
      ports:
        - '8084:8080'
        - '2022:2022'
        - '2121:2121'
        - '10080:10080'
      volumes:
        - sftpgodata:/srv/sftpgo
        - sftpgohome:/var/lib/sftpgo
        - ./customers:/srv/customers
      environment:
        - SFTPGO_DATA_PROVIDER__DRIVER=sqlite
        - SFTPGO_DATA_PROVIDER__NAME=/var/lib/sftpgo/sftpgo.db
        - SFTPGO_DATA_PROVIDER__UPDATE_MODE=0
        - SFTPGO_DATA_PROVIDER__CREATE_DEFAULT_ADMIN=true
        - SFTPGO_DEFAULT_ADMIN_USERNAME=sftpgo
        - SFTPGO_DEFAULT_ADMIN_PASSWORD=sftpgo
        - SFTPGO_HTTPD_BINDINGS_0_PORT=8080
        - SFTPGO_HTTPD_BINDINGS_0_ADDRESS=0.0.0.0
        - SFTPGO_HTTPD_ENABLE_API=true
      networks:
        - hosting-net

    # ==========================================================================
    # MAIL SERVER (Mailpit - test SMTP)
    #
    # Responsibility: MAIL TEAM
    # Documentation:  docs/UKOLY-MAIL.md
    #
    # Mailpit = captures all emails and displays them in web interface.
    # For development/testing - no emails leave the system.
    #
    # >>> COMMENTED OUT - uncomment when ready <<<
    # ==========================================================================
    iredmail:
      image: lejmr/iredmail:mysql-latest
      restart: unless-stopped
      container_name: hc-iredmail
      hostname: mail
      domainname: magehosting.cz
      environment:
        - DOMAIN=magehosting.cz
        - HOSTNAME=mail
        - MYSQL_ROOT_PASSWORD=password
        - SOGO_WORKERS=1
        - TIMEZONE=Europe/Prague
        - POSTMASTER_PASSWORD={PLAIN}password
        - ENABLE_WEBADMIN=YES
        - DISABLE_SSL=FALSE
        - IREDAPD_PLUGINS=['reject_null_sender', 'reject_sender_login_mismatch', 'greylisting', 'throttle', 'amavisd_wblist', 'sql_alias_access_policy']
      volumes:
        - iredmail-mysql:/var/lib/mysql
        - iredmail-vmail:/var/vmail
        - iredmail-clamav:/var/lib/clamav
        - ./mail/mail.magehosting.cz.crt:/etc/pki/tls/certs/iRedMail.crt:ro
        - ./mail/mail.magehosting.cz.key:/etc/pki/tls/private/iRedMail.key:ro
      ports:
        - "8025:80"
        - "443:443"
        - "25:25"
        - "587:587"
        - "110:110"
        - "143:143"
        - "993:993"
        - "995:995"
      networks:
        hosting-net:
          aliases:
              - mail.magehosting.cz


    # ==========================================================================
    # PHPMYADMIN (Optional - DB admin)
    #
    # For easier database management during development.
    # Access: http://localhost:8081
    #
    # >>> COMMENTED OUT - uncomment if needed <<<
    # ==========================================================================
    phpmyadmin:
      image: phpmyadmin:latest
      container_name: hc-phpmyadmin
      restart: unless-stopped
      depends_on:
        - db
      environment:
        PMA_HOST: db
        PMA_PORT: 3306
      ports:
        - "8081:80"
      networks:
        - hosting-net

  # ==============================================================================
  # NETWORKS
  # ==============================================================================
  networks:
    hosting-net:
      driver: bridge

  # ==============================================================================
  # VOLUMES
  # ==============================================================================
  volumes:
    db_data:
      name: hc-db-data
    iredmail-mysql:
    iredmail-vmail:
    iredmail-clamav:
    sftpgodata:
    sftpgohome:
