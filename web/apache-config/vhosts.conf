# ==============================================================================
# HOSTING CENTRUM - Apache VirtualHosts
#
# Architecture:
#   1. Main VirtualHost - reverse proxy to frontend/API services
#   2. Generated customer VirtualHosts - emitted by publish flow into /srv/apache/vhosts.d/
#
# For testing, add to /etc/hosts (or use *.localhost domains which auto-resolve):
#   127.0.0.1   localhost frontend.local api.local dbadmin.local sftp.local mail.local
#   127.0.0.1   demo-1.localhost demo-2.localhost demo-3.localhost
# ==============================================================================

# ==============================================================================
# MAIN VIRTUALHOST - Platform (Frontend)
# ==============================================================================
<VirtualHost *:80>
    ServerName localhost
    ServerAlias frontend.local

    DocumentRoot /srv/frontend

    <Directory /srv/frontend>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted

        RewriteEngine On
        RewriteBase /
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule . /index.html [L]
    </Directory>

    ErrorLog /proc/self/fd/2
    CustomLog /proc/self/fd/1 combined
</VirtualHost>

# ==================================================================
# BACKEND API + Swagger
# ==================================================================
<VirtualHost *:80>
    ServerName api.local

    ProxyPass / http://hc-backend:8080/
    ProxyPassReverse / http://hc-backend:8080/

    RedirectMatch ^/$ /swagger-ui/index.html

    ErrorLog /proc/self/fd/2
    CustomLog /proc/self/fd/1 combined
</VirtualHost>

# ==================================================================
# PHPMyAdmin
# ==================================================================
<VirtualHost *:80>
    ServerName dbadmin.local

    ProxyPreserveHost On
    ProxyPass / http://hc-phpmyadmin:80/
    ProxyPassReverse / http://hc-phpmyadmin:80/

    ErrorLog /proc/self/fd/2
    CustomLog /proc/self/fd/1 combined
</VirtualHost>

# ==================================================================
# SFTPGo Web UI
# ==================================================================
<VirtualHost *:80>
    ServerName sftp.local

    ProxyPass / http://hc-sftpgo:8080/
    ProxyPassReverse / http://hc-sftpgo:8080/

    RedirectMatch ^/$ /web/

    ErrorLog /proc/self/fd/2
    CustomLog /proc/self/fd/1 combined
</VirtualHost>

# ==================================================================
# Mail Web UI
# ==================================================================
<VirtualHost *:80>
    ServerName mail.local

    ProxyPreserveHost On

    ProxyPass / http://hc-iredmail:80/
    ProxyPassReverse / http://hc-iredmail:80/

    ErrorLog /proc/self/fd/2
    CustomLog /proc/self/fd/1 combined
</VirtualHost>

# ==================================================================
# Generated customer vhosts
# Populated by backend publish flow (ProjectServiceImpl.publishProject)
# ==================================================================
IncludeOptional conf/extra/vhosts.d/*.conf
