# ==============================================================================
# HOSTING CENTRUM - Apache VirtualHosts
#
# WEBSERVER TEAM: Add additional VirtualHosts as needed.
#
# Architecture:
#   1. Main VirtualHost - reverse proxy to Spring Boot API
#   2. Customer VirtualHosts - serve static content from /srv/customers/
#
# For testing, add to /etc/hosts:
#   127.0.0.1   localhost
#   127.0.0.1   www.mojefirma.cz mojefirma.cz
#   127.0.0.1   www.druhafirma.cz druhafirma.cz
#   127.0.0.1   www.tretifirma.cz tretifirma.cz
# ==============================================================================

# ==============================================================================
# MAIN VIRTUALHOST - Platform (API + Frontend)
#
# All requests go to Spring Boot backend.
# FRONTEND TEAM: If using React/Next.js, modify proxy rules.
# ==============================================================================
<VirtualHost *:80>
    ServerName localhost
    ServerAlias frontend.local

    DocumentRoot /srv/frontend

    <Directory /srv/frontend>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog /proc/self/fd/2
    CustomLog /proc/self/fd/1 combined
</VirtualHost>

# ==================================================================
# BACKEND API + Swagger
# ==================================================================
<VirtualHost *:80>
    ServerName api.local

    ProxyPass / http://hc-backend:8080/
    ProxyPassReverse / http://hc-backend:8080/

    RedirectMatch ^/$ /swagger-ui/index.html

    ErrorLog /proc/self/fd/2
    CustomLog /proc/self/fd/1 combined
</VirtualHost>

# ==================================================================
# PHPMyAdmin
# ==================================================================
<VirtualHost *:80>
    ServerName dbadmin.local

    ProxyPreserveHost On
    ProxyPass / http://hc-phpmyadmin:80/
    ProxyPassReverse / http://hc-phpmyadmin:80/

    ErrorLog /proc/self/fd/2
    CustomLog /proc/self/fd/1 combined
</VirtualHost>

# ==================================================================
# SFTPGo Web UI
# ==================================================================
<VirtualHost *:80>
    ServerName sftp.local

    ProxyPass / http://hc-sftpgo:8080/
    ProxyPassReverse / http://hc-sftpgo:8080/

    RedirectMatch ^/$ /web/

    ErrorLog /proc/self/fd/2
    CustomLog /proc/self/fd/1 combined
</VirtualHost>

# ==================================================================
# Mail Web UI
# ==================================================================
<VirtualHost *:80>
    ServerName mail.local

    ProxyPreserveHost On
    ProxyPass /iredadmin http://hc-iredmail:80/iredadmin
    ProxyPassReverse /iredadmin http://hc-iredmail:80/iredadmin

    ProxyPass / http://hc-iredmail:80/
    ProxyPassReverse / http://hc-iredmail:80/

    ErrorLog /proc/self/fd/2
    CustomLog /proc/self/fd/1 combined
</VirtualHost>