# Template for generated customer project vhosts.
# Placeholders:
#   {{SERVER_NAME}}   => fqdn domain (e.g., customer.example.com)
#   {{DOCUMENT_ROOT}} => absolute document root for customer web

<VirtualHost *:80>
    ServerName {{SERVER_NAME}}
    DocumentRoot "{{DOCUMENT_ROOT}}"

    <Directory "{{DOCUMENT_ROOT}}">
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog /proc/self/fd/2
    CustomLog /proc/self/fd/1 combined
</VirtualHost>
