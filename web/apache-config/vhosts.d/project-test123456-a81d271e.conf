<VirtualHost *:80>
    ServerName domain.com
    ServerAlias www.domain.com
    DocumentRoot "/srv/customers/user_9/test123456-a81d271e/www"

    <Directory "/srv/customers/user_9/test123456-a81d271e/www">
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
        DirectoryIndex index.html index.htm
